<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>AI Leaders Digest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<style>
/* ============================================================
   Tokens — Elden Ring palette (the real site is restrained:
   black surface, cracked-gold logo, white sans-serif body,
   one circular gold sigil as hero anchor). 70 / 25 / 5 ratio.
   ============================================================ */
:root {
  --er-bg-deep:      #050402;
  --er-bg-soft:      #110A06;
  --er-bg-card:      #0E0805;
  --er-frame-muted:  #2E2113;
  --er-gold-deep:    #5C4218;
  --er-gold-muted:   #8C6A2B;
  --er-gold:         #C9962E;
  --er-gold-bright:  #F1C75A;
  --er-text:         #F5F1E8;       /* warm near-white body text */
  --er-text-dim:     #A39A88;       /* secondary text */
  --er-accent-cyan:  #9BD7E0;
  --er-accent-red:   #A8392C;

  --font-display: 'Cinzel Decorative', 'Trajan Pro', 'Times New Roman', serif;
  --font-ui:      'Inter', 'PingFang SC', 'Helvetica Neue', system-ui, -apple-system, sans-serif;

  --ease-curtain: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-ignite:  cubic-bezier(0.4, 0, 0.2, 1);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--er-bg-deep);
  color: var(--er-text);
  font-family: var(--font-ui);
  font-size: 15px;
  line-height: 1.6;
  font-weight: 400;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  /* One subtle radial gold bloom over the hero, plus a faint vignette */
  background-image:
    radial-gradient(ellipse 90% 50% at 50% -10%, rgba(201, 150, 46, 0.10) 0%, transparent 65%),
    radial-gradient(ellipse at center, transparent 32%, rgba(0,0,0,0.55) 100%);
  background-attachment: fixed;
}

/* ============================================================
   Layout
   ============================================================ */
main { position: relative; z-index: 1; }

/* ============================================================
   Header — sigil + cracked-gold logo + tagline + stats
   ============================================================ */
.site-header {
  text-align: center;
  padding: 64px 24px 28px;
  position: relative;
}
.site-header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: min(640px, 82vw); height: 1px;
  background: linear-gradient(90deg, transparent, var(--er-gold-muted) 50%, transparent);
}

/* The Elden Ring sigil — concentric rings with a single bright spark arc */
.sigil {
  display: inline-block;
  width: clamp(56px, 9vw, 84px);
  height: clamp(56px, 9vw, 84px);
  margin-bottom: 22px;
  position: relative;
  animation: sigil-fade 1.2s var(--ease-curtain) both;
}
@keyframes sigil-fade {
  from { opacity: 0; transform: scale(0.85); }
  to   { opacity: 1; transform: scale(1); }
}
.sigil svg { width: 100%; height: 100%; display: block; }
.sigil .ring-outer,
.sigil .ring-inner,
.sigil .ring-mid { fill: none; stroke: var(--er-gold-muted); stroke-width: 1.2; }
.sigil .ring-mid { stroke: var(--er-gold); }
.sigil .spark {
  fill: none;
  stroke: var(--er-gold-bright);
  stroke-width: 1.4;
  stroke-dasharray: 18 200;
  stroke-linecap: round;
  filter: drop-shadow(0 0 6px rgba(241, 199, 90, 0.7));
  animation: spark-orbit 6s linear infinite;
  transform-origin: center;
}
.sigil .core {
  fill: var(--er-gold-bright);
  filter: drop-shadow(0 0 5px rgba(241, 199, 90, 0.7));
  animation: core-pulse 3s ease-in-out infinite;
}
.sigil .bar { stroke: var(--er-gold-muted); stroke-width: 1; }
@keyframes spark-orbit {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
@keyframes core-pulse {
  0%, 100% { opacity: 0.85; }
  50%      { opacity: 1; }
}

.brand-wrap {
  display: block;
  animation: title-rise 1.4s 0.15s var(--ease-curtain) both;
}
@keyframes title-rise {
  0%   { opacity: 0; letter-spacing: 0.36em; filter: blur(8px); }
  60%  { opacity: 1; filter: blur(0); }
  100% { opacity: 1; letter-spacing: 0.16em; filter: blur(0); }
}
.brand {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(28px, 5.6vw, 52px);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  margin: 0;
  line-height: 1.05;
  /* Cracked-gold gradient — used ONLY here, once per page */
  background-image:
    linear-gradient(180deg,
      var(--er-gold-bright) 0%,
      var(--er-gold) 48%,
      var(--er-gold-deep) 92%);
  -webkit-background-clip: text;
          background-clip: text;
  color: transparent;
  text-shadow:
    0 0 28px rgba(241, 199, 90, 0.18),
    0 1px 0 rgba(0, 0, 0, 0.7);
}

.tagline {
  font-family: var(--font-ui);
  font-weight: 400;
  font-size: clamp(12px, 1.4vw, 14px);
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--er-gold-muted);
  margin-top: 16px;
  animation: fade-in 1.4s 0.5s var(--ease-curtain) both;
}
@keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

.stats-strip {
  display: flex;
  justify-content: center;
  gap: clamp(16px, 3vw, 36px);
  margin-top: 24px;
  flex-wrap: wrap;
  animation: fade-in 1.2s 0.75s var(--ease-curtain) both;
}
.stat {
  font-family: var(--font-ui);
  font-weight: 500;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.22em;
  color: var(--er-gold-muted);
}
.stat-num {
  display: inline-block;
  margin-left: 8px;
  color: var(--er-text);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  font-size: 13px;
  letter-spacing: 0;
}

/* ============================================================
   Rune divider — used sparingly (hero only)
   ============================================================ */
.rune-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 22px 0 6px;
  color: var(--er-gold-muted);
}
.rune-divider .line {
  flex: 1 1 0;
  max-width: 200px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--er-gold-muted) 40%, var(--er-gold-muted) 60%, transparent);
}
.rune-divider .glyph {
  font-size: 9px;
  letter-spacing: 0.4em;
  font-family: var(--font-display);
  text-shadow: 0 0 10px rgba(201, 150, 46, 0.4);
}

/* ============================================================
   Tabs — bold sans-serif, gold-accented underline on active
   ============================================================ */
.tabs {
  display: flex;
  justify-content: center;
  gap: 0;
  margin: 8px 0 12px;
  position: relative;
  animation: fade-in 1s 0.95s var(--ease-curtain) both;
}
.tab {
  background: transparent;
  border: none;
  padding: 14px 32px;
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.22em;
  color: var(--er-text-dim);
  cursor: pointer;
  transition: color 220ms ease, text-shadow 220ms ease;
  min-height: 44px;
  position: relative;
}
.tab::after {
  content: '';
  position: absolute;
  bottom: 0; left: 50%;
  width: 0; height: 1.5px;
  background: var(--er-gold);
  transform: translateX(-50%);
  transition: width 320ms var(--ease-ignite);
}
.tab:hover { color: var(--er-text); }
.tab.active {
  color: var(--er-gold);
}
.tab.active::after { width: 56px; }

/* ============================================================
   Toolbar
   ============================================================ */
.toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  max-width: 920px;
  margin: 24px auto 16px;
  padding: 0 16px;
  animation: fade-in 1s 1.1s var(--ease-curtain) both;
}
.search-wrap {
  position: relative;
  flex: 1 1 240px;
  min-width: 200px;
}
.search-wrap::before {
  content: '';
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  width: 14px; height: 14px;
  background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='none' stroke='%238C6A2B' stroke-width='1.4'><circle cx='7' cy='7' r='5'/><path d='M11 11l4 4'/></svg>") no-repeat center / contain;
  pointer-events: none;
}
.search-wrap input { padding-left: 36px; width: 100%; }

.toolbar input,
.toolbar select {
  background: var(--er-bg-soft);
  border: 1px solid var(--er-frame-muted);
  color: var(--er-text);
  font-family: var(--font-ui);
  font-weight: 400;
  font-size: 14px;
  padding: 11px 14px;
  outline: none;
  min-height: 44px;
  transition: all 220ms ease;
}
.toolbar input::placeholder {
  color: var(--er-text-dim);
  font-weight: 400;
  letter-spacing: 0.02em;
}
.toolbar input:focus,
.toolbar select:focus {
  border-color: var(--er-gold);
  box-shadow:
    inset 0 0 18px rgba(201, 150, 46, 0.08),
    0 0 0 1px rgba(201, 150, 46, 0.20);
}
.toolbar select {
  flex: 1 1 180px;
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%238C6A2B' d='M0 0l5 6 5-6z'/></svg>");
  background-repeat: no-repeat;
  background-position: right 14px center;
  padding-right: 36px;
}

/* Buttons — pill rectangle, 1px gold-muted border, sans-serif uppercase */
.btn {
  background: transparent;
  border: 1px solid var(--er-gold-muted);
  color: var(--er-gold-muted);
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  padding: 11px 22px;
  cursor: pointer;
  transition: all 240ms var(--ease-ignite);
  min-height: 44px;
  white-space: nowrap;
  position: relative;
  overflow: hidden;
}
.btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg,
    transparent 30%, rgba(241, 199, 90, 0.12) 50%, transparent 70%);
  transform: translateX(-120%);
  transition: transform 600ms var(--ease-ignite);
}
.btn:hover {
  border-color: var(--er-gold);
  color: var(--er-gold);
  box-shadow: inset 0 0 22px rgba(201, 150, 46, 0.12);
}
.btn:hover::before { transform: translateX(120%); }
.btn.active {
  border-color: var(--er-gold-bright);
  color: var(--er-gold-bright);
  box-shadow: inset 0 0 22px rgba(241, 199, 90, 0.18);
}

/* ============================================================
   Tweet feed
   ============================================================ */
.feed {
  max-width: 920px;
  margin: 0 auto;
  padding: 0 16px 80px;
  position: relative;
}
.tweet {
  border-top: 1px solid var(--er-frame-muted);
  padding: 24px 6px;
  display: grid;
  grid-template-columns: 56px 1fr;
  gap: 16px;
  position: relative;
  transition: background 240ms ease;
  animation: tweet-rise 600ms var(--ease-curtain) both;
}
.tweet:last-child { border-bottom: 1px solid var(--er-frame-muted); }
.tweet::before {
  content: '';
  position: absolute;
  left: 0; top: 30%; bottom: 30%;
  width: 2px;
  background: linear-gradient(180deg, transparent, var(--er-gold), transparent);
  opacity: 0;
  transition: opacity 320ms ease, top 320ms ease, bottom 320ms ease;
  box-shadow: 0 0 10px rgba(201, 150, 46, 0.5);
}
.tweet:hover { background: rgba(201, 150, 46, 0.03); }
.tweet:hover::before {
  opacity: 1;
  top: 12%; bottom: 12%;
}
@keyframes tweet-rise {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
/* Restrained stagger: only first 5 cards, 20ms apart */
.tweet:nth-child(1) { animation-delay: 0.04s; }
.tweet:nth-child(2) { animation-delay: 0.08s; }
.tweet:nth-child(3) { animation-delay: 0.12s; }
.tweet:nth-child(4) { animation-delay: 0.16s; }
.tweet:nth-child(5) { animation-delay: 0.20s; }

.avatar {
  width: 48px; height: 48px;
  display: grid;
  place-items: center;
  border: 1px solid var(--er-gold-muted);
  background: var(--er-bg-card);
  font-family: var(--font-ui);
  font-size: 18px;
  font-weight: 700;
  color: var(--er-gold);
  letter-spacing: 0;
  border-radius: 50%;
  transition: all 240ms ease;
}
.tweet:hover .avatar {
  border-color: var(--er-gold);
  color: var(--er-gold-bright);
  box-shadow: 0 0 14px rgba(201, 150, 46, 0.25);
}

.tweet-body { min-width: 0; }
.tweet-meta {
  display: flex;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 8px 14px;
  margin-bottom: 6px;
}
.author-name {
  font-family: var(--font-ui);
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.02em;
  color: var(--er-text);
  cursor: pointer;
  transition: color 200ms ease;
}
.author-name:hover { color: var(--er-gold); }
.handle {
  color: var(--er-text-dim);
  font-size: 13px;
  font-weight: 400;
}
.handle::before { content: "@"; }
.cat {
  font-family: var(--font-ui);
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--er-text-dim);
  border: 1px solid var(--er-frame-muted);
  padding: 3px 9px;
}
.timestamp {
  font-size: 12px;
  color: var(--er-text-dim);
  margin-left: auto;
  font-variant-numeric: tabular-nums;
  font-weight: 400;
}
.retweet-tag {
  font-family: var(--font-ui);
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.18em;
  color: var(--er-text-dim);
  text-transform: uppercase;
}

.tweet-text {
  color: var(--er-text);
  font-size: 15.5px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
  margin: 6px 0 14px;
  font-weight: 400;
}
.tweet-actions {
  display: flex;
  align-items: center;
  gap: 14px;
  font-family: var(--font-ui);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 600;
}
.tweet-actions a {
  color: var(--er-text-dim);
  text-decoration: none;
  transition: color 200ms ease;
  border-bottom: 1px solid transparent;
  padding-bottom: 2px;
}
.tweet-actions a:hover {
  color: var(--er-gold);
  border-bottom-color: var(--er-gold-muted);
}

/* ============================================================
   Star — circular gold-ring floating button (per official site)
   ============================================================ */
.star-btn {
  width: 38px; height: 38px;
  min-width: 44px; min-height: 44px;  /* hit area */
  background: transparent;
  border: 1.5px solid var(--er-gold-muted);
  border-radius: 50%;
  cursor: pointer;
  position: relative;
  display: grid;
  place-items: center;
  padding: 0;
  transition: all 260ms var(--ease-ignite);
}
.star-btn svg {
  width: 16px; height: 16px;
  display: block;
}
.star-btn .star-stroke {
  fill: none;
  stroke: var(--er-gold-muted);
  stroke-width: 1.5;
  transition: all 240ms var(--ease-ignite);
}
.star-btn:hover {
  border-color: var(--er-gold);
  box-shadow: 0 0 14px rgba(201, 150, 46, 0.40);
}
.star-btn:hover .star-stroke { stroke: var(--er-gold); }
.star-btn.starred {
  border-color: var(--er-gold-bright);
  background: radial-gradient(circle, rgba(241, 199, 90, 0.18), rgba(241, 199, 90, 0.04) 70%);
  box-shadow: 0 0 16px rgba(241, 199, 90, 0.45);
}
.star-btn.starred .star-stroke {
  fill: var(--er-gold-bright);
  stroke: var(--er-gold-bright);
}
@keyframes ember-rise {
  0%   { opacity: 0; transform: translate(0, 0) scale(1); }
  20%  { opacity: 0.95; }
  100% { opacity: 0; transform: translate(var(--dx, 6px), -28px) scale(0.5); }
}
.star-btn .ember {
  position: absolute;
  width: 3px; height: 3px;
  background: var(--er-gold-bright);
  border-radius: 50%;
  pointer-events: none;
  top: 50%; left: 50%;
  filter: drop-shadow(0 0 4px rgba(241, 199, 90, 0.9));
}

/* ============================================================
   Digests
   ============================================================ */
.digests-list {
  max-width: 920px;
  margin: 0 auto;
  padding: 0 16px 80px;
}
.digest-row {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 22px;
  align-items: center;
  padding: 26px 6px;
  border-top: 1px solid var(--er-frame-muted);
  position: relative;
  transition: background 240ms ease;
  animation: tweet-rise 600ms var(--ease-curtain) both;
}
.digest-row:nth-child(1) { animation-delay: 0.04s; }
.digest-row:nth-child(2) { animation-delay: 0.08s; }
.digest-row:nth-child(3) { animation-delay: 0.12s; }
.digest-row:nth-child(4) { animation-delay: 0.16s; }
.digest-row:nth-child(5) { animation-delay: 0.20s; }
.digest-row:last-child { border-bottom: 1px solid var(--er-frame-muted); }
.digest-row:hover { background: rgba(201, 150, 46, 0.03); }
.digest-row::before {
  content: '';
  position: absolute;
  left: 0; top: 50%;
  width: 2px; height: 0;
  background: linear-gradient(180deg, transparent, var(--er-gold), transparent);
  transform: translateY(-50%);
  transition: height 320ms ease;
  box-shadow: 0 0 10px rgba(201, 150, 46, 0.5);
}
.digest-row:hover::before { height: 76%; }
.digest-date {
  font-family: var(--font-ui);
  font-weight: 800;
  font-size: clamp(20px, 2.4vw, 26px);
  color: var(--er-text);
  letter-spacing: 0.02em;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}
.digest-meta {
  color: var(--er-text-dim);
  font-size: 14px;
  font-weight: 400;
}
.digest-meta-num {
  font-weight: 700;
  color: var(--er-text);
  font-variant-numeric: tabular-nums;
}
.digest-meta em {
  font-style: normal;
  color: var(--er-gold-muted);
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: 0.16em;
  font-weight: 600;
}

/* Read / unread visual: unread rows carry a small flame-coloured glyph
   before the date and a 'NEW' label in the meta line; read rows fade
   their date down to text-dim. Elden Ring vibe — beckoning to the
   unread, dimmed once consulted. */
.digest-unread-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: 12px;
  vertical-align: middle;
  background: radial-gradient(circle at 35% 30%, #ffd86a, var(--er-gold) 55%, transparent 75%);
  box-shadow: 0 0 8px rgba(201, 150, 46, 0.7), 0 0 16px rgba(201, 150, 46, 0.35);
  opacity: 0;
  transition: opacity 200ms ease;
}
.digest-row.is-unread .digest-unread-dot { opacity: 1; }
.digest-row.is-read .digest-date { color: var(--er-text-dim); font-weight: 600; }
.digest-row.is-read { opacity: 0.78; }
.digest-row.is-read:hover { opacity: 1; }
.digest-unread-label {
  display: inline-block;
  margin-left: 10px;
  padding: 1px 8px;
  border: 1px solid var(--er-gold);
  color: var(--er-gold);
  font-family: var(--font-ui);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  vertical-align: middle;
  background: rgba(201, 150, 46, 0.06);
}

/* ============================================================
   Modal
   ============================================================ */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(5, 4, 2, 0.90);
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  display: none;
  align-items: flex-start;
  justify-content: center;
  z-index: 100;
  overflow-y: auto;
  padding: 36px 16px 64px;
}
.modal-backdrop.open {
  display: flex;
  animation: backdrop-in 220ms ease both;
}
@keyframes backdrop-in { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background:
    radial-gradient(ellipse 80% 30% at 50% 0%, rgba(201, 150, 46, 0.05), transparent 70%),
    var(--er-bg-soft);
  border: 1px solid var(--er-gold-muted);
  max-width: 760px;
  width: 100%;
  padding: 32px 36px 44px;
  position: relative;
  animation: modal-in 420ms var(--ease-curtain) both;
  box-shadow:
    0 0 0 1px rgba(0, 0, 0, 0.6) inset,
    0 24px 80px rgba(0, 0, 0, 0.6);
}
@keyframes modal-in {
  from { opacity: 0; transform: translateY(24px) scale(0.985); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.modal-header {
  display: flex;
  align-items: baseline;
  gap: 18px;
  border-bottom: 1px solid var(--er-frame-muted);
  padding-bottom: 14px;
  margin-bottom: 22px;
  flex-wrap: wrap;
}
.modal-eyebrow {
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--er-gold-muted);
  display: block;
  margin-bottom: 6px;
}
.modal-title {
  font-family: var(--font-ui);
  font-weight: 800;
  font-size: clamp(22px, 3vw, 30px);
  color: var(--er-text);
  letter-spacing: -0.005em;
  margin: 0;
}
.modal-meta {
  color: var(--er-text-dim);
  font-size: 13px;
  margin-left: auto;
  font-weight: 400;
}
.modal-close {
  position: absolute;
  top: 14px; right: 18px;
  background: none;
  border: none;
  color: var(--er-gold-muted);
  cursor: pointer;
  font-size: 26px;
  line-height: 1;
  font-family: var(--font-ui);
  padding: 6px 12px;
  min-width: 44px; min-height: 44px;
  transition: color 200ms ease, transform 200ms ease;
}
.modal-read-toggle {
  margin-top: 6px;
  background: transparent;
  border: 1px solid var(--er-gold-muted);
  color: var(--er-gold-muted);
  font-family: var(--font-ui);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 5px 12px;
  cursor: pointer;
  transition: color 160ms, border-color 160ms, background 160ms;
  align-self: flex-start;
}
.modal-read-toggle:hover {
  color: var(--er-gold);
  border-color: var(--er-gold);
  background: rgba(201, 150, 46, 0.06);
}
.modal-close:hover {
  color: var(--er-gold-bright);
  transform: rotate(90deg);
}
.modal-body { color: var(--er-text); font-size: 15px; line-height: 1.7; }
.modal-body h1 {
  font-family: var(--font-ui);
  font-size: 24px;
  font-weight: 800;
  color: var(--er-text);
  letter-spacing: -0.005em;
  border-bottom: 1px solid var(--er-frame-muted);
  padding-bottom: 8px;
  margin: 32px 0 16px;
}
.modal-body h2 {
  font-family: var(--font-ui);
  font-size: 17px;
  font-weight: 700;
  color: var(--er-text);
  letter-spacing: 0.005em;
  margin: 28px 0 12px;
}
.modal-body h3 {
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 700;
  color: var(--er-gold-muted);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin: 22px 0 10px;
}
.modal-body p { margin: 10px 0; }
.modal-body strong { color: var(--er-gold); font-weight: 700; }
.modal-body em { color: var(--er-text-dim); font-style: italic; }
.modal-body a { color: var(--er-gold); text-decoration: underline dotted var(--er-gold-muted); text-underline-offset: 3px; }
.modal-body a:hover { color: var(--er-gold-bright); }
.modal-body ul, .modal-body ol { padding-left: 24px; }
.modal-body li { margin: 6px 0; }
.modal-body code {
  font-family: 'SF Mono', 'Menlo', monospace;
  font-size: 13px;
  background: rgba(140, 106, 43, 0.14);
  color: var(--er-text);
  padding: 2px 6px;
}
.modal-body hr {
  border: none;
  border-top: 1px solid var(--er-frame-muted);
  margin: 22px 0;
}

/* ============================================================
   Loader — three concentric runes (kept; this is a key motif)
   ============================================================ */
.loader {
  display: grid;
  place-items: center;
  padding: 80px 20px;
  gap: 18px;
}
.loader .rings {
  position: relative;
  width: 56px; height: 56px;
}
.loader .rings svg {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
}
.loader .rings .r-outer { animation: spin 5.2s linear infinite; }
.loader .rings .r-mid   { animation: spin 3.4s linear infinite reverse; }
.loader .rings .r-inner { animation: spin 2.0s linear infinite; }
.loader .rings circle {
  fill: none;
  stroke: var(--er-gold-muted);
  stroke-width: 1.2;
  stroke-linecap: round;
}
.loader .rings .r-outer circle { stroke-dasharray: 70 90; }
.loader .rings .r-mid circle   { stroke: var(--er-gold); stroke-dasharray: 30 50; }
.loader .rings .r-inner circle { stroke: var(--er-gold-bright); stroke-dasharray: 12 20; filter: drop-shadow(0 0 4px rgba(241, 199, 90, 0.6)); }
.loader-text {
  color: var(--er-text-dim);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ============================================================
   Empty state — uses rune divider once
   ============================================================ */
.empty {
  text-align: center;
  padding: 80px 20px;
  color: var(--er-text-dim);
}
.empty-glyph {
  font-family: var(--font-display);
  color: var(--er-gold-muted);
  font-size: 22px;
  letter-spacing: 0.5em;
  text-shadow: 0 0 14px rgba(201, 150, 46, 0.3);
  margin-bottom: 16px;
}
.empty-title {
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--er-text);
  margin-bottom: 8px;
}
.empty-text { font-size: 14px; }

/* ============================================================
   Footer
   ============================================================ */
.load-more-wrap {
  display: grid;
  place-items: center;
  padding: 36px 0 12px;
}
.site-footer {
  border-top: 1px solid var(--er-frame-muted);
  margin-top: 48px;
  padding: 28px 24px 40px;
  text-align: center;
}
.footer-text {
  color: var(--er-text-dim);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
}

/* ============================================================
   Custom scrollbar
   ============================================================ */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--er-bg-deep); }
::-webkit-scrollbar-thumb { background: var(--er-frame-muted); }
::-webkit-scrollbar-thumb:hover { background: var(--er-gold-muted); }

/* ============================================================
   Mobile (≤768px)
   ============================================================ */
@media (max-width: 768px) {
  .site-header { padding: 40px 16px 22px; }
  .stats-strip { gap: 14px; margin-top: 18px; }
  .stat { font-size: 10px; letter-spacing: 0.16em; }
  .tab { padding: 14px 18px; font-size: 11px; letter-spacing: 0.18em; }
  .toolbar { padding: 0 12px; gap: 8px; }
  .toolbar input, .toolbar select { font-size: 14px; padding: 10px 12px; }
  .feed, .digests-list { padding: 0 12px 60px; }
  .tweet { grid-template-columns: 40px 1fr; gap: 12px; padding: 22px 0; }
  .avatar { width: 40px; height: 40px; font-size: 16px; }
  .tweet-text { font-size: 15.5px; }
  .timestamp { margin-left: 0; flex-basis: 100%; }
  .modal { padding: 24px 20px 32px; }
  .modal-title { font-size: 19px; }
  .digest-row { grid-template-columns: 1fr auto; gap: 12px; padding: 22px 0; }
  .digest-meta { grid-column: 1 / -1; font-size: 13px; }
  .rune-divider .line { max-width: 80px; }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-delay: 0ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>

<main>

<header class="site-header">
  <!-- ER sigil — concentric rings + central core + orbiting bright spark -->
  <div class="sigil" aria-hidden="true">
    <svg viewBox="0 0 80 80">
      <!-- Outer ring -->
      <circle class="ring-outer" cx="40" cy="40" r="36"/>
      <!-- Middle (brighter) ring -->
      <circle class="ring-mid" cx="40" cy="40" r="26"/>
      <!-- Inner ring -->
      <circle class="ring-inner" cx="40" cy="40" r="14"/>
      <!-- Vertical bisecting bar -->
      <line class="bar" x1="40" y1="2" x2="40" y2="78"/>
      <!-- Horizontal short bar at center -->
      <line class="bar" x1="20" y1="40" x2="60" y2="40"/>
      <!-- Bright spark arc orbiting along the outer ring -->
      <circle class="spark" cx="40" cy="40" r="36"/>
      <!-- Central core dot -->
      <circle class="core" cx="40" cy="40" r="2.6"/>
    </svg>
  </div>

  <div class="brand-wrap">
    <h1 class="brand">AI Leaders Digest</h1>
  </div>
  <div class="tagline">Chronicles of the Demigods</div>
  <div class="stats-strip" id="stats-strip"></div>
</header>

<div class="rune-divider" aria-hidden="true">
  <span class="line"></span>
  <span class="glyph">◇ ◆ ◇</span>
  <span class="line"></span>
</div>

<nav class="tabs">
  <button class="tab active" data-tab="tweets" id="tab-tweets">Tweets</button>
  <button class="tab" data-tab="digests" id="tab-digests">Digests</button>
</nav>

<!-- ===================== TWEETS view ===================== -->
<section id="view-tweets">
  <div class="toolbar">
    <div class="search-wrap">
      <input type="search" id="search" placeholder="Search the chronicles…">
    </div>
    <select id="author-filter">
      <option value="">All authors</option>
    </select>
    <button class="btn" id="starred-toggle">★ Starred only</button>
  </div>
  <div class="feed" id="tweet-feed"></div>
  <div class="load-more-wrap" id="load-more-wrap"></div>
</section>

<!-- ===================== DIGESTS view ===================== -->
<section id="view-digests" hidden>
  <div class="digests-list" id="digest-list"></div>
</section>

<!-- ===================== Modal ===================== -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal" role="dialog" aria-modal="true">
    <button class="modal-close" id="modal-close" aria-label="close">×</button>
    <header class="modal-header">
      <div>
        <span class="modal-eyebrow">Digest of the day</span>
        <h2 class="modal-title" id="modal-title">…</h2>
      </div>
      <span class="modal-meta" id="modal-meta"></span>
      <button type="button" class="modal-read-toggle" id="modal-read-toggle" hidden>mark read</button>
    </header>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<footer class="site-footer">
  <div class="footer-text">grace beckons · refresh to gather</div>
</footer>

</main>

<script>
// ============================================================
// State
// ============================================================
const state = {
  tab: 'tweets',
  page: 1,
  pageSize: 50,
  author: '',
  query: '',
  starred: false,
  loading: false,
  hasNext: false,
  authorMap: {},
};

const $ = (sel) => document.querySelector(sel);

// ============================================================
// SVG snippets
// ============================================================
const STAR_SVG = `<svg viewBox="0 0 24 24" aria-hidden="true">
  <path class="star-stroke" d="M12 2.5l2.7 6.4 6.9.6-5.2 4.6 1.6 6.8L12 17.3l-6 3.6 1.6-6.8-5.2-4.6 6.9-.6z"/>
</svg>`;

const RINGS_SVG = `
  <svg class="r-outer" viewBox="0 0 56 56"><circle cx="28" cy="28" r="25"/></svg>
  <svg class="r-mid" viewBox="0 0 56 56"><circle cx="28" cy="28" r="18"/></svg>
  <svg class="r-inner" viewBox="0 0 56 56"><circle cx="28" cy="28" r="10"/></svg>
`;

function loaderHTML(text) {
  return `<div class="loader"><div class="rings">${RINGS_SVG}</div><div class="loader-text">${text}</div></div>`;
}

function emptyHTML(title, body) {
  return `<div class="empty">
    <div class="empty-glyph">◇ ◆ ◇</div>
    <div class="empty-title">${title}</div>
    <div class="empty-text">${body}</div>
  </div>`;
}

// ============================================================
// Helpers
// ============================================================
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return iso.slice(0, 10);
  const now = new Date();
  const diffMs = now - d;
  const diffH = diffMs / 3600000;
  if (diffH < 1) return Math.max(1, Math.floor(diffMs / 60000)) + 'm';
  if (diffH < 24) return Math.floor(diffH) + 'h';
  if (diffH < 24 * 7) return Math.floor(diffH / 24) + 'd';
  return d.toISOString().slice(0, 10);
}
function fmtFullDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return iso.slice(0, 10);
  return d.toISOString().slice(0, 10);
}
function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}
function avatarInitial(name) {
  const ch = (name || '?').trim().charAt(0).toUpperCase();
  return ch || '?';
}
async function fetchJSON(url, opts) {
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ============================================================
// Stats
// ============================================================
async function loadStats() {
  try {
    const s = await fetchJSON('/api/stats');
    const latestStr = s.latest_tweet ? fmtFullDate(s.latest_tweet) : '—';
    $('#stats-strip').innerHTML = `
      <span class="stat">Tweets <span class="stat-num">${s.tweets_total}</span></span>
      <span class="stat">Starred <span class="stat-num">${s.tweets_starred}</span></span>
      <span class="stat">Sources <span class="stat-num">${s.authors_enabled}</span></span>
      <span class="stat">Digests <span class="stat-num">${s.summaries_total}</span></span>
      <span class="stat">Latest <span class="stat-num">${latestStr}</span></span>
    `;
  } catch (e) {
    $('#stats-strip').innerHTML = `<span class="stat">stats unavailable</span>`;
  }
}

// ============================================================
// Authors
// ============================================================
async function loadAuthors() {
  const { authors } = await fetchJSON('/api/authors');
  state.authorMap = Object.fromEntries(authors.map(a => [a.handle, a]));
  const sel = $('#author-filter');
  sel.innerHTML = '<option value="">All authors</option>' +
    authors.map(a =>
      `<option value="${escapeHtml(a.handle)}">${escapeHtml(a.name)} · ${a.tweet_count}</option>`
    ).join('');
}

// ============================================================
// Tweets
// ============================================================
function tweetCardHTML(t) {
  const name = t.author_name || t.author;
  const init = avatarInitial(name);
  const starredClass = t.starred ? ' starred' : '';
  const cat = t.category ? `<span class="cat">${escapeHtml(t.category)}</span>` : '';
  const rt = t.is_retweet ? `<span class="retweet-tag">↻ Retweet</span>` : '';
  const url = t.url ? `<a href="${escapeHtml(t.url)}" target="_blank" rel="noopener">View on X</a>` : '';
  return `
    <article class="tweet" data-tweet-id="${t.id}">
      <div class="avatar" title="${escapeHtml(name)}">${escapeHtml(init)}</div>
      <div class="tweet-body">
        <div class="tweet-meta">
          <span class="author-name" data-handle="${escapeHtml(t.author)}">${escapeHtml(name)}</span>
          <span class="handle">${escapeHtml(t.author)}</span>
          ${cat}
          ${rt}
          <span class="timestamp" title="${escapeHtml(t.date)}">${fmtDate(t.date)}</span>
        </div>
        <div class="tweet-text">${escapeHtml(t.text)}</div>
        <div class="tweet-actions">
          <button class="star-btn${starredClass}" data-action="star" aria-label="star tweet">${STAR_SVG}</button>
          ${url}
        </div>
      </div>
    </article>
  `;
}

async function loadTweets({ append = false } = {}) {
  if (state.loading) return;
  state.loading = true;
  const feed = $('#tweet-feed');
  if (!append) feed.innerHTML = loaderHTML('the grace is gathering…');

  const params = new URLSearchParams({
    page: state.page, page_size: state.pageSize,
  });
  if (state.author) params.set('author', state.author);
  if (state.query) params.set('q', state.query);
  if (state.starred) params.set('starred', 'true');

  let data;
  try {
    data = await fetchJSON('/api/tweets?' + params);
  } catch (e) {
    feed.innerHTML = emptyHTML('the lands are still', `(${e.message})`);
    state.loading = false;
    return;
  }

  state.hasNext = data.has_next;
  const html = data.tweets.map(tweetCardHTML).join('');

  if (!append) {
    if (data.tweets.length === 0) {
      feed.innerHTML = emptyHTML('The world has gone silent', 'No tweets match the current filter.');
    } else {
      feed.innerHTML = html;
    }
  } else {
    feed.insertAdjacentHTML('beforeend', html);
  }

  const lm = $('#load-more-wrap');
  lm.innerHTML = state.hasNext
    ? `<button class="btn" id="load-more-btn">Reveal more</button>`
    : '';
  if (state.hasNext) {
    $('#load-more-btn').addEventListener('click', () => {
      state.page += 1;
      loadTweets({ append: true });
    });
  }
  state.loading = false;
}

// ============================================================
// Star
// ============================================================
async function toggleStar(btn, tweetId) {
  const wasStarred = btn.classList.contains('starred');
  const url = `/api/tweets/${tweetId}/${wasStarred ? 'unstar' : 'star'}`;
  try { await fetchJSON(url, { method: 'POST' }); } catch (e) { return; }
  btn.classList.toggle('starred');
  if (!wasStarred) emitEmbers(btn);
  loadStats();
}
function emitEmbers(btn) {
  for (let i = 0; i < 3; i++) {
    const e = document.createElement('span');
    e.className = 'ember';
    const dx = (Math.random() - 0.5) * 16;
    e.style.setProperty('--dx', dx + 'px');
    e.style.animation = `ember-rise 700ms ease-out forwards`;
    e.style.animationDelay = (i * 70) + 'ms';
    btn.appendChild(e);
    setTimeout(() => e.remove(), 850);
  }
}

// ============================================================
// Digests
// ============================================================
async function loadDigests() {
  const list = $('#digest-list');
  list.innerHTML = loaderHTML('opening the archive…');
  let data;
  try {
    data = await fetchJSON('/api/summaries');
  } catch (e) {
    list.innerHTML = emptyHTML('archive sealed', `(${e.message})`);
    return;
  }
  if (!data.summaries.length) {
    list.innerHTML = emptyHTML('no chronicles yet', 'No digests have been written.');
    return;
  }
  list.innerHTML = data.summaries.map(s => `
    <div class="digest-row ${s.is_read ? 'is-read' : 'is-unread'}" data-id="${s.id}" data-is-read="${s.is_read ? '1' : '0'}">
      <div class="digest-date">
        <span class="digest-unread-dot" aria-hidden="true"></span>${escapeHtml(s.date)}
      </div>
      <div class="digest-meta">
        <span class="digest-meta-num">${s.tweet_count ?? 0}</span> tweets ·
        <span class="digest-meta-num">${s.sources_ok ?? 0}/${s.sources_total ?? 0}</span> sources ·
        <em>${escapeHtml(s.focus_profile || 'default')}</em>
        ${s.is_read ? '' : '<span class="digest-unread-label">NEW</span>'}
      </div>
      <button class="btn" data-action="open">Open</button>
    </div>
  `).join('');
}

async function markDigestReadState(id, isRead) {
  // Optimistic UI: flip the row's class first, then POST. If the POST
  // fails we leave the optimistic state — a refresh will resync from DB.
  const row = document.querySelector(`.digest-row[data-id="${id}"]`);
  if (row) {
    row.classList.toggle('is-read', isRead);
    row.classList.toggle('is-unread', !isRead);
    row.dataset.isRead = isRead ? '1' : '0';
    const label = row.querySelector('.digest-unread-label');
    if (isRead && label) label.remove();
    else if (!isRead && !label) {
      const meta = row.querySelector('.digest-meta');
      if (meta) meta.insertAdjacentHTML('beforeend', ' <span class="digest-unread-label">NEW</span>');
    }
  }
  // Drawer toggle button label
  const btn = $('#modal-read-toggle');
  if (btn && btn.dataset.id === String(id)) {
    btn.textContent = isRead ? 'mark unread' : 'mark read';
    btn.dataset.isRead = isRead ? '1' : '0';
  }
  try {
    await fetch(`/api/summaries/${id}/${isRead ? 'read' : 'unread'}`, { method: 'POST' });
  } catch (e) { /* swallow; next reload will resync */ }
}

async function openDigest(id) {
  const backdrop = $('#modal-backdrop');
  $('#modal-title').textContent = 'Loading…';
  $('#modal-meta').textContent = '';
  $('#modal-body').innerHTML = loaderHTML('unfurling the parchment…');
  backdrop.classList.add('open');
  let s;
  try {
    s = await fetchJSON('/api/summaries/' + id);
  } catch (e) {
    $('#modal-body').innerHTML = emptyHTML('lost to time', `(${e.message})`);
    return;
  }
  $('#modal-title').textContent = s.date;
  $('#modal-meta').textContent =
    `${s.tweet_count ?? 0} tweets · ${s.sources_ok ?? 0}/${s.sources_total ?? 0} sources · ${s.focus_profile || 'default'}`;
  // Sync the modal's read-toggle button with the loaded digest.
  const btn = $('#modal-read-toggle');
  if (btn) {
    btn.dataset.id = String(id);
    btn.dataset.isRead = s.is_read ? '1' : '0';
    btn.textContent = s.is_read ? 'mark unread' : 'mark read';
    btn.hidden = false;
  }
  $('#modal-body').innerHTML = window.marked
    ? marked.parse(s.content || '')
    : `<pre style="white-space:pre-wrap">${escapeHtml(s.content || '')}</pre>`;
  $('#modal-body').scrollTop = 0;
  // Auto-mark read when the drawer opens (the act of opening counts as
  // reading). The user can flip it back via the toggle.
  if (!s.is_read) markDigestReadState(id, true);
}

// ============================================================
// Tabs
// ============================================================
function switchTab(tab) {
  state.tab = tab;
  document.querySelectorAll('.tab').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  $('#view-tweets').hidden = tab !== 'tweets';
  $('#view-digests').hidden = tab !== 'digests';
  if (tab === 'digests') loadDigests();
  if (tab === 'tweets' && !$('#tweet-feed').children.length) loadTweets();
}

// ============================================================
// Event delegation
// ============================================================
document.addEventListener('click', (ev) => {
  const tabBtn = ev.target.closest('.tab');
  if (tabBtn) { switchTab(tabBtn.dataset.tab); return; }

  const starBtn = ev.target.closest('.star-btn');
  if (starBtn) {
    const t = starBtn.closest('.tweet');
    if (t) toggleStar(starBtn, t.dataset.tweetId);
    return;
  }

  const authorLink = ev.target.closest('.author-name');
  if (authorLink) {
    state.author = authorLink.dataset.handle;
    state.page = 1;
    $('#author-filter').value = state.author;
    switchTab('tweets');
    loadTweets();
    return;
  }

  const digestRow = ev.target.closest('.digest-row');
  if (digestRow && ev.target.closest('[data-action="open"]')) {
    openDigest(digestRow.dataset.id);
    return;
  }

  const readToggle = ev.target.closest('#modal-read-toggle');
  if (readToggle) {
    const id = parseInt(readToggle.dataset.id, 10);
    const currentlyRead = readToggle.dataset.isRead === '1';
    if (id) markDigestReadState(id, !currentlyRead);
    return;
  }

  if (ev.target === $('#modal-backdrop') || ev.target.closest('#modal-close')) {
    $('#modal-backdrop').classList.remove('open');
    return;
  }
});

document.addEventListener('keydown', (ev) => {
  if (ev.key === 'Escape') $('#modal-backdrop').classList.remove('open');
});

let searchDebounce;
$('#search').addEventListener('input', (ev) => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    state.query = ev.target.value.trim();
    state.page = 1;
    loadTweets();
  }, 250);
});

$('#author-filter').addEventListener('change', (ev) => {
  state.author = ev.target.value;
  state.page = 1;
  loadTweets();
});

$('#starred-toggle').addEventListener('click', () => {
  state.starred = !state.starred;
  $('#starred-toggle').classList.toggle('active', state.starred);
  state.page = 1;
  loadTweets();
});

// ============================================================
// Boot
// ============================================================
(async function init() {
  await Promise.all([loadStats(), loadAuthors()]);
  loadTweets();
})();
</script>
</body>
</html>
