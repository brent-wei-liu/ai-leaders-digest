<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>AI Leaders Digest — Chronicles of the Demigods</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<style>
/* ============================================================
   Tokens — Elden Ring palette + extended motion tokens.
   Working ratio: ~70% black/dark-brown · ~25% gold · ~5% parchment.
   ============================================================ */
:root {
  --er-bg-deep:      #0A0604;
  --er-bg-soft:      #1B120B;
  --er-bg-inset:     #120A06;
  --er-frame-muted:  #3A2A18;
  --er-gold-deep:    #5C4218;
  --er-gold-muted:   #8C6A2B;
  --er-gold:         #C9962E;
  --er-gold-bright:  #F1C75A;
  --er-parchment:    #E8DCB4;
  --er-parchment-dim:#A89779;
  --er-accent-cyan:  #9BD7E0;
  --er-accent-red:   #A8392C;

  --font-display:  'Cinzel Decorative', 'Cinzel', 'Trajan Pro', serif;
  --font-title:    'Cinzel', 'Trajan Pro', 'Times New Roman', serif;
  --font-body:     'Cormorant Garamond', 'Songti SC', 'STSong', 'Georgia', serif;

  --ease-curtain:  cubic-bezier(0.16, 1, 0.3, 1);  /* exponential out */
  --ease-ignite:   cubic-bezier(0.4, 0, 0.2, 1);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--er-bg-deep);
  color: var(--er-parchment);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.65;
  min-height: 100vh;
  overflow-x: hidden;
  /* Layered atmosphere: vignette + subtle gold radial bloom + grain */
  background-image:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201, 150, 46, 0.08) 0%, transparent 60%),
    radial-gradient(ellipse at center, transparent 28%, rgba(0,0,0,0.65) 100%),
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.55  0 0 0 0 0.42  0 0 0 0 0.17  0 0 0 0.045 0'/></filter><rect width='240' height='240' filter='url(%23n)'/></svg>");
  background-attachment: fixed, fixed, fixed;
  background-size: cover, cover, 240px 240px;
}

/* ============================================================
   Cursor-following gold halo (desktop)
   ============================================================ */
.aura {
  position: fixed;
  pointer-events: none;
  width: 380px; height: 380px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(241, 199, 90, 0.07) 0%, rgba(201, 150, 46, 0.025) 35%, transparent 65%);
  mix-blend-mode: screen;
  z-index: 1;
  opacity: 0;
  transition: opacity 600ms ease-out;
  transform: translate(-50%, -50%);
}
@media (hover: hover) and (pointer: fine) {
  .aura.live { opacity: 1; }
}

/* ============================================================
   Ambient ember drift (top of page, ≤6 motes)
   ============================================================ */
.ambient-embers {
  position: fixed;
  inset: 0 0 auto 0;
  height: 100vh;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.ambient-embers .mote {
  position: absolute;
  width: 2px; height: 2px;
  background: var(--er-gold-bright);
  border-radius: 50%;
  filter: drop-shadow(0 0 4px rgba(241, 199, 90, 0.6));
  animation: drift linear infinite;
  opacity: 0;
}
.ambient-embers .mote:nth-child(1) { left: 10%; animation-duration: 22s; animation-delay: 0s; }
.ambient-embers .mote:nth-child(2) { left: 28%; animation-duration: 28s; animation-delay: -8s; }
.ambient-embers .mote:nth-child(3) { left: 47%; animation-duration: 24s; animation-delay: -3s; }
.ambient-embers .mote:nth-child(4) { left: 62%; animation-duration: 30s; animation-delay: -14s; }
.ambient-embers .mote:nth-child(5) { left: 78%; animation-duration: 26s; animation-delay: -18s; }
.ambient-embers .mote:nth-child(6) { left: 91%; animation-duration: 32s; animation-delay: -6s; }
@keyframes drift {
  0%   { bottom: -10px; opacity: 0; transform: translateX(0); }
  10%  { opacity: 0.65; }
  90%  { opacity: 0.5; }
  100% { bottom: 102vh; opacity: 0; transform: translateX(40px); }
}

/* ============================================================
   Page wrapper for stacking context
   ============================================================ */
main {
  position: relative;
  z-index: 2;
}

/* ============================================================
   Header — the cracked-gold moment
   ============================================================ */
.site-header {
  text-align: center;
  padding: 56px 24px 22px;
  position: relative;
}
.site-header::before {
  content: '';
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: min(620px, 80vw); height: 1px;
  background: linear-gradient(90deg, transparent, var(--er-gold-muted), transparent);
}

.brand-wrap {
  display: inline-block;
  position: relative;
  animation: title-rise 1.4s var(--ease-curtain) both;
}
@keyframes title-rise {
  0%   { opacity: 0; transform: translateY(18px); letter-spacing: 0.36em; filter: blur(6px); }
  60%  { opacity: 1; filter: blur(0); }
  100% { opacity: 1; transform: translateY(0); letter-spacing: 0.18em; filter: blur(0); }
}

.brand {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(28px, 6vw, 56px);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin: 0;
  line-height: 1.05;
  /* Cracked gold: gradient text + faint inner shadow */
  background-image:
    linear-gradient(180deg,
      var(--er-gold-bright) 0%,
      var(--er-gold) 45%,
      var(--er-gold-deep) 90%);
  -webkit-background-clip: text;
          background-clip: text;
  color: transparent;
  text-shadow:
    0 0 26px rgba(241, 199, 90, 0.18),
    0 1px 0 rgba(0, 0, 0, 0.8);
  position: relative;
}
/* Decorative diamonds flanking the brand */
.brand::before, .brand::after {
  content: '◆';
  position: absolute;
  top: 50%;
  font-size: 0.32em;
  color: var(--er-gold-muted);
  transform: translateY(-50%);
  text-shadow: 0 0 10px rgba(201, 150, 46, 0.45);
}
.brand::before { left: -1.6em; }
.brand::after  { right: -1.6em; }

.tagline {
  font-family: var(--font-body);
  font-style: italic;
  font-weight: 400;
  color: var(--er-gold-muted);
  font-size: clamp(13px, 1.6vw, 16px);
  letter-spacing: 0.16em;
  margin-top: 14px;
  animation: fade-in 1.6s 0.4s var(--ease-curtain) both;
}
@keyframes fade-in {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.stats-strip {
  display: flex;
  justify-content: center;
  gap: clamp(14px, 3vw, 36px);
  margin-top: 22px;
  flex-wrap: wrap;
  animation: fade-in 1.4s 0.7s var(--ease-curtain) both;
}
.stat {
  font-family: var(--font-title);
  font-weight: 500;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.24em;
  color: var(--er-gold-muted);
}
.stat-num {
  display: inline-block;
  margin-left: 8px;
  color: var(--er-parchment);
  font-family: var(--font-body);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  font-size: 14px;
}

/* ============================================================
   Rune divider — the signature ornament
   Three diamonds linked by hairline rules.
   ============================================================ */
.rune-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 18px 0;
  color: var(--er-gold-muted);
}
.rune-divider .line {
  flex: 1 1 0;
  max-width: 180px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--er-gold-muted) 40%, var(--er-gold-muted) 60%, transparent);
}
.rune-divider .glyph {
  font-size: 9px;
  letter-spacing: 0.4em;
  text-shadow: 0 0 10px rgba(201, 150, 46, 0.4);
}

/* ============================================================
   Tab bar
   ============================================================ */
.tabs {
  display: flex;
  justify-content: center;
  gap: 0;
  margin: 6px 0 8px;
  position: relative;
  animation: fade-in 1.2s 0.95s var(--ease-curtain) both;
}
.tab {
  flex: 0 1 auto;
  background: transparent;
  border: none;
  padding: 14px 36px;
  font-family: var(--font-title);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.28em;
  color: var(--er-gold-muted);
  cursor: pointer;
  transition: color 220ms ease, text-shadow 220ms ease;
  min-height: 44px;
  position: relative;
}
.tab::after {
  content: '';
  position: absolute;
  bottom: 0; left: 50%;
  width: 0; height: 1px;
  background: var(--er-gold-bright);
  transform: translateX(-50%);
  transition: width 320ms var(--ease-ignite);
  box-shadow: 0 0 12px rgba(241, 199, 90, 0.6);
}
.tab:hover { color: var(--er-gold); }
.tab.active {
  color: var(--er-gold-bright);
  text-shadow: 0 0 16px rgba(241, 199, 90, 0.32);
}
.tab.active::after { width: 70%; }

/* ============================================================
   Toolbar
   ============================================================ */
.toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  max-width: 920px;
  margin: 22px auto 16px;
  padding: 0 16px;
  animation: fade-in 1.2s 1.1s var(--ease-curtain) both;
}
.search-wrap {
  position: relative;
  flex: 1 1 240px;
  min-width: 200px;
}
.search-wrap::before {
  content: '✦';
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--er-gold-muted);
  font-size: 14px;
  pointer-events: none;
  text-shadow: 0 0 8px rgba(201, 150, 46, 0.3);
}
.search-wrap input { padding-left: 36px; width: 100%; }

.toolbar input,
.toolbar select {
  background: var(--er-bg-soft);
  border: 1px solid var(--er-frame-muted);
  color: var(--er-parchment);
  font-family: var(--font-body);
  font-size: 15px;
  padding: 11px 14px;
  outline: none;
  min-height: 44px;
  transition: all 220ms ease;
}
.toolbar input::placeholder {
  color: var(--er-gold-muted);
  font-style: italic;
  letter-spacing: 0.04em;
}
.toolbar input:focus,
.toolbar select:focus {
  border-color: var(--er-gold);
  box-shadow:
    inset 0 0 18px rgba(201, 150, 46, 0.10),
    0 0 0 1px rgba(201, 150, 46, 0.25);
}
.toolbar select {
  flex: 1 1 180px;
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%238C6A2B' d='M0 0l5 6 5-6z'/></svg>");
  background-repeat: no-repeat;
  background-position: right 14px center;
  padding-right: 36px;
}

/* Buttons */
.btn {
  background: transparent;
  border: 1px solid var(--er-gold-muted);
  color: var(--er-gold-muted);
  font-family: var(--font-title);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.22em;
  padding: 10px 22px;
  cursor: pointer;
  transition: all 240ms var(--ease-ignite);
  min-height: 44px;
  white-space: nowrap;
  position: relative;
  overflow: hidden;
}
.btn::before {
  /* Sweeping gold shimmer on hover */
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg,
    transparent 30%, rgba(241, 199, 90, 0.16) 50%, transparent 70%);
  transform: translateX(-120%);
  transition: transform 600ms var(--ease-ignite);
}
.btn:hover {
  border-color: var(--er-gold);
  color: var(--er-gold);
  box-shadow: inset 0 0 22px rgba(201, 150, 46, 0.16);
}
.btn:hover::before { transform: translateX(120%); }
.btn.active {
  border-color: var(--er-gold-bright);
  color: var(--er-gold-bright);
  box-shadow: inset 0 0 22px rgba(241, 199, 90, 0.25);
}

/* ============================================================
   Tweet feed
   ============================================================ */
.feed {
  max-width: 920px;
  margin: 0 auto;
  padding: 0 16px 80px;
  position: relative;
}
.tweet {
  border-top: 1px solid var(--er-frame-muted);
  padding: 26px 6px;
  display: grid;
  grid-template-columns: 56px 1fr;
  gap: 16px;
  position: relative;
  transition: background 260ms ease;
  animation: tweet-rise 800ms var(--ease-curtain) both;
}
.tweet:last-child { border-bottom: 1px solid var(--er-frame-muted); }
.tweet::before {
  /* "Igniting" left edge on hover */
  content: '';
  position: absolute;
  left: 0; top: 30%; bottom: 30%;
  width: 2px;
  background: linear-gradient(180deg, transparent, var(--er-gold-bright), transparent);
  opacity: 0;
  transition: opacity 320ms ease, top 320ms ease, bottom 320ms ease;
  box-shadow: 0 0 12px rgba(241, 199, 90, 0.6);
}
.tweet:hover {
  background: rgba(201, 150, 46, 0.04);
}
.tweet:hover::before {
  opacity: 1;
  top: 10%; bottom: 10%;
}
@keyframes tweet-rise {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.tweet:nth-child(1)  { animation-delay: 0.05s; }
.tweet:nth-child(2)  { animation-delay: 0.10s; }
.tweet:nth-child(3)  { animation-delay: 0.15s; }
.tweet:nth-child(4)  { animation-delay: 0.20s; }
.tweet:nth-child(5)  { animation-delay: 0.25s; }
.tweet:nth-child(6)  { animation-delay: 0.30s; }
.tweet:nth-child(7)  { animation-delay: 0.35s; }
.tweet:nth-child(8)  { animation-delay: 0.40s; }
.tweet:nth-child(9)  { animation-delay: 0.45s; }
.tweet:nth-child(10) { animation-delay: 0.50s; }

.avatar {
  width: 48px; height: 48px;
  display: grid;
  place-items: center;
  border: 1px solid var(--er-gold-muted);
  background:
    radial-gradient(circle at 30% 30%, rgba(241, 199, 90, 0.08), transparent 60%),
    var(--er-bg-soft);
  font-family: var(--font-title);
  font-size: 17px;
  font-weight: 700;
  color: var(--er-gold);
  letter-spacing: 0.04em;
  /* Notched corners */
  clip-path: polygon(
    5px 0, calc(100% - 5px) 0, 100% 5px,
    100% calc(100% - 5px), calc(100% - 5px) 100%,
    5px 100%, 0 calc(100% - 5px), 0 5px
  );
  transition: all 280ms ease;
}
.tweet:hover .avatar {
  border-color: var(--er-gold);
  color: var(--er-gold-bright);
  box-shadow: 0 0 16px rgba(201, 150, 46, 0.25);
}

.tweet-body { min-width: 0; }
.tweet-meta {
  display: flex;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 8px 14px;
  margin-bottom: 6px;
}
.author-name {
  font-family: var(--font-title);
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--er-gold);
  cursor: pointer;
  transition: color 200ms ease, text-shadow 200ms ease;
}
.author-name:hover {
  color: var(--er-gold-bright);
  text-shadow: 0 0 14px rgba(241, 199, 90, 0.35);
}
.handle {
  font-style: italic;
  color: var(--er-gold-muted);
  font-size: 13px;
}
.handle::before { content: "@"; }
.cat {
  font-family: var(--font-title);
  font-size: 9.5px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--er-parchment-dim);
  border: 1px solid var(--er-frame-muted);
  padding: 2px 9px;
}
.timestamp {
  font-style: italic;
  font-size: 12px;
  color: var(--er-gold-muted);
  margin-left: auto;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.05em;
}
.retweet-tag {
  font-family: var(--font-title);
  font-size: 9.5px;
  letter-spacing: 0.22em;
  color: var(--er-parchment-dim);
  text-transform: uppercase;
}

.tweet-text {
  color: var(--er-parchment);
  font-size: 16.5px;
  line-height: 1.62;
  white-space: pre-wrap;
  word-break: break-word;
  margin: 8px 0 14px;
  font-weight: 400;
}
.tweet-actions {
  display: flex;
  align-items: center;
  gap: 22px;
  font-family: var(--font-title);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
}
.tweet-actions a {
  color: var(--er-gold-muted);
  text-decoration: none;
  transition: color 200ms ease, text-shadow 200ms ease;
  border-bottom: 1px solid transparent;
  padding-bottom: 2px;
}
.tweet-actions a:hover {
  color: var(--er-gold);
  text-shadow: 0 0 10px rgba(201, 150, 46, 0.4);
  border-bottom-color: var(--er-gold-muted);
}

/* Star button */
.star-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px;
  margin: -6px;
  position: relative;
  min-width: 44px;
  min-height: 44px;
  display: grid;
  place-items: center;
  transition: filter 200ms ease;
}
.star-btn svg { width: 24px; height: 24px; display: block; }
.star-btn .star-stroke {
  fill: none;
  stroke: var(--er-gold-muted);
  stroke-width: 1.4;
  transition: all 240ms var(--ease-ignite);
}
.star-btn:hover .star-stroke {
  stroke: var(--er-gold);
  filter: drop-shadow(0 0 8px rgba(201, 150, 46, 0.5));
}
.star-btn.starred .star-stroke {
  fill: var(--er-gold-bright);
  stroke: var(--er-gold-bright);
  filter: drop-shadow(0 0 12px rgba(241, 199, 90, 0.65));
  animation: star-flash 600ms var(--ease-ignite);
}
@keyframes star-flash {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.28); }
  100% { transform: scale(1); }
}
@keyframes ember-rise {
  0%   { opacity: 0; transform: translate(0, 0) scale(1); }
  20%  { opacity: 0.95; }
  100% { opacity: 0; transform: translate(var(--dx, 6px), -28px) scale(0.5); }
}
.star-btn .ember {
  position: absolute;
  width: 3px; height: 3px;
  background: var(--er-gold-bright);
  border-radius: 50%;
  pointer-events: none;
  top: 50%; left: 50%;
  filter: drop-shadow(0 0 4px rgba(241, 199, 90, 0.9));
}

/* ============================================================
   Digests
   ============================================================ */
.digests-list {
  max-width: 920px;
  margin: 0 auto;
  padding: 0 16px 80px;
}
.digest-row {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 22px;
  align-items: center;
  padding: 26px 6px;
  border-top: 1px solid var(--er-frame-muted);
  position: relative;
  transition: background 260ms ease;
  animation: tweet-rise 700ms var(--ease-curtain) both;
}
.digest-row:nth-child(1) { animation-delay: 0.06s; }
.digest-row:nth-child(2) { animation-delay: 0.12s; }
.digest-row:nth-child(3) { animation-delay: 0.18s; }
.digest-row:nth-child(4) { animation-delay: 0.24s; }
.digest-row:nth-child(5) { animation-delay: 0.30s; }
.digest-row:nth-child(6) { animation-delay: 0.36s; }
.digest-row:nth-child(7) { animation-delay: 0.42s; }
.digest-row:nth-child(8) { animation-delay: 0.48s; }
.digest-row:last-child { border-bottom: 1px solid var(--er-frame-muted); }
.digest-row:hover { background: rgba(201, 150, 46, 0.04); }
.digest-row::before {
  content: '';
  position: absolute;
  left: 0; top: 50%;
  width: 2px; height: 0;
  background: linear-gradient(180deg, transparent, var(--er-gold-bright), transparent);
  transform: translateY(-50%);
  transition: height 320ms ease;
  box-shadow: 0 0 12px rgba(241, 199, 90, 0.6);
}
.digest-row:hover::before { height: 80%; }

.digest-date {
  font-family: var(--font-title);
  font-weight: 700;
  font-size: clamp(20px, 2.4vw, 28px);
  color: var(--er-gold);
  letter-spacing: 0.06em;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}
.digest-meta {
  font-style: italic;
  color: var(--er-gold-muted);
  font-size: 14px;
}
.digest-meta-num {
  font-style: normal;
  font-weight: 600;
  color: var(--er-parchment);
  font-variant-numeric: tabular-nums;
}

/* ============================================================
   Modal
   ============================================================ */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(10, 6, 4, 0.88);
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  display: none;
  align-items: flex-start;
  justify-content: center;
  z-index: 100;
  overflow-y: auto;
  padding: 36px 16px 64px;
}
.modal-backdrop.open {
  display: flex;
  animation: backdrop-in 220ms ease both;
}
@keyframes backdrop-in {
  from { opacity: 0; }
  to   { opacity: 1; }
}
.modal {
  background:
    radial-gradient(ellipse 80% 30% at 50% 0%, rgba(201, 150, 46, 0.06), transparent 70%),
    var(--er-bg-soft);
  border: 1px solid var(--er-gold-muted);
  max-width: 760px;
  width: 100%;
  padding: 32px 36px 44px;
  position: relative;
  animation: modal-in 420ms var(--ease-curtain) both;
  box-shadow:
    0 0 0 1px rgba(0, 0, 0, 0.6) inset,
    0 24px 80px rgba(0, 0, 0, 0.6);
}
@keyframes modal-in {
  from { opacity: 0; transform: translateY(28px) scale(0.985); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.modal-header {
  display: flex;
  align-items: baseline;
  gap: 18px;
  border-bottom: 1px solid var(--er-frame-muted);
  padding-bottom: 14px;
  margin-bottom: 22px;
  flex-wrap: wrap;
}
.modal-eyebrow {
  font-family: var(--font-title);
  font-size: 10px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--er-gold-muted);
  display: block;
  margin-bottom: 4px;
}
.modal-title {
  font-family: var(--font-title);
  font-weight: 700;
  font-size: clamp(22px, 3vw, 32px);
  color: var(--er-gold);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin: 0;
  text-shadow: 0 0 18px rgba(201, 150, 46, 0.18);
}
.modal-meta {
  font-style: italic;
  color: var(--er-gold-muted);
  font-size: 13px;
  margin-left: auto;
  letter-spacing: 0.04em;
}
.modal-close {
  position: absolute;
  top: 14px; right: 18px;
  background: none;
  border: none;
  color: var(--er-gold-muted);
  cursor: pointer;
  font-size: 28px;
  line-height: 1;
  font-family: var(--font-title);
  padding: 6px 12px;
  min-width: 44px; min-height: 44px;
  transition: color 200ms ease, text-shadow 200ms ease, transform 200ms ease;
}
.modal-close:hover {
  color: var(--er-gold-bright);
  text-shadow: 0 0 12px rgba(241, 199, 90, 0.5);
  transform: rotate(90deg);
}
.modal-body { color: var(--er-parchment); font-size: 16px; }
.modal-body h1 {
  font-family: var(--font-title);
  font-size: 26px;
  font-weight: 700;
  color: var(--er-gold);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--er-frame-muted);
  padding-bottom: 8px;
  margin: 32px 0 16px;
}
.modal-body h2 {
  font-family: var(--font-title);
  font-size: 17px;
  font-weight: 600;
  color: var(--er-gold);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  margin: 28px 0 12px;
}
.modal-body h3 {
  font-family: var(--font-title);
  font-size: 13px;
  font-weight: 500;
  color: var(--er-gold-muted);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin: 22px 0 10px;
}
.modal-body p { line-height: 1.7; margin: 10px 0; }
.modal-body strong { color: var(--er-gold); font-weight: 600; }
.modal-body em { color: var(--er-gold-muted); font-style: italic; }
.modal-body a { color: var(--er-gold); text-decoration: underline dotted var(--er-gold-muted); text-underline-offset: 3px; }
.modal-body a:hover { color: var(--er-gold-bright); }
.modal-body ul, .modal-body ol { padding-left: 24px; }
.modal-body li { margin: 6px 0; }
.modal-body code {
  font-family: 'SF Mono', 'Menlo', monospace;
  font-size: 13px;
  background: rgba(140, 106, 43, 0.14);
  color: var(--er-parchment);
  padding: 2px 6px;
}
.modal-body hr {
  border: none;
  border-top: 1px solid var(--er-frame-muted);
  margin: 22px 0;
  position: relative;
}

/* ============================================================
   Loader — three concentric runes turning at staggered speeds
   ============================================================ */
.loader {
  display: grid;
  place-items: center;
  padding: 80px 20px;
  gap: 18px;
}
.loader .rings {
  position: relative;
  width: 56px; height: 56px;
}
.loader .rings svg {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
}
.loader .rings .r-outer { animation: spin 5.2s linear infinite; }
.loader .rings .r-mid   { animation: spin 3.4s linear infinite reverse; }
.loader .rings .r-inner { animation: spin 2.0s linear infinite; }
.loader .rings circle {
  fill: none;
  stroke: var(--er-gold-muted);
  stroke-width: 1.2;
  stroke-linecap: round;
}
.loader .rings .r-outer circle { stroke-dasharray: 70 90; }
.loader .rings .r-mid circle   { stroke: var(--er-gold); stroke-dasharray: 30 50; }
.loader .rings .r-inner circle { stroke: var(--er-gold-bright); stroke-dasharray: 12 20; filter: drop-shadow(0 0 4px rgba(241, 199, 90, 0.6)); }
.loader-text {
  font-style: italic;
  color: var(--er-gold-muted);
  font-size: 13px;
  letter-spacing: 0.06em;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ============================================================
   Empty state
   ============================================================ */
.empty {
  text-align: center;
  padding: 100px 20px;
  color: var(--er-gold-muted);
}
.empty-glyph {
  font-family: var(--font-display);
  color: var(--er-gold-muted);
  font-size: 26px;
  letter-spacing: 0.5em;
  text-shadow: 0 0 14px rgba(201, 150, 46, 0.3);
  margin-bottom: 18px;
}
.empty-title {
  font-family: var(--font-title);
  font-size: 14px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--er-gold);
  margin-bottom: 8px;
}
.empty-text { font-style: italic; }

/* ============================================================
   Footer / Load more
   ============================================================ */
.load-more-wrap {
  display: grid;
  place-items: center;
  padding: 36px 0 12px;
}
.site-footer {
  border-top: 1px solid var(--er-frame-muted);
  margin-top: 40px;
  padding: 32px 24px 48px;
  text-align: center;
}
.site-footer .seal {
  display: inline-block;
  margin-bottom: 14px;
  opacity: 0.7;
}
.site-footer .seal svg {
  width: 38px; height: 38px;
}
.site-footer .seal svg circle {
  fill: none;
  stroke: var(--er-gold-muted);
  stroke-width: 1;
}
.site-footer .seal svg .ring-spark {
  stroke: var(--er-gold);
  stroke-width: 1.2;
}
.footer-text {
  font-family: var(--font-body);
  font-style: italic;
  color: var(--er-frame-muted);
  font-size: 12px;
  letter-spacing: 0.08em;
}

/* ============================================================
   Custom scrollbar
   ============================================================ */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--er-bg-deep); }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--er-frame-muted), var(--er-gold-deep));
}
::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, var(--er-gold-deep), var(--er-gold-muted));
}

/* ============================================================
   Mobile (≤768px)
   ============================================================ */
@media (max-width: 768px) {
  .site-header { padding: 36px 16px 18px; }
  .brand::before, .brand::after { font-size: 0.26em; }
  .brand::before { left: -1.2em; }
  .brand::after  { right: -1.2em; }
  .stats-strip { gap: 14px; margin-top: 16px; }
  .stat { font-size: 10px; letter-spacing: 0.18em; }
  .tab { padding: 14px 18px; font-size: 11px; letter-spacing: 0.2em; }
  .toolbar { padding: 0 12px; gap: 8px; }
  .toolbar input, .toolbar select { font-size: 14px; padding: 10px 12px; }
  .feed, .digests-list { padding: 0 12px 60px; }
  .tweet { grid-template-columns: 40px 1fr; gap: 12px; padding: 22px 0; }
  .avatar { width: 38px; height: 38px; font-size: 14px; }
  .tweet-text { font-size: 15.5px; }
  .timestamp { margin-left: 0; flex-basis: 100%; }
  .modal { padding: 24px 20px 32px; }
  .modal-title { font-size: 18px; }
  .digest-row { grid-template-columns: 1fr auto; gap: 12px; padding: 22px 0; }
  .digest-meta { grid-column: 1 / -1; font-size: 13px; }
  .rune-divider .line { max-width: 80px; }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-delay: 0ms !important;
    transition-duration: 0.01ms !important;
  }
  .ambient-embers { display: none; }
  .aura { display: none; }
}
</style>
</head>
<body>

<div class="aura" id="aura"></div>

<div class="ambient-embers" aria-hidden="true">
  <span class="mote"></span><span class="mote"></span><span class="mote"></span>
  <span class="mote"></span><span class="mote"></span><span class="mote"></span>
</div>

<main>

<header class="site-header">
  <div class="brand-wrap">
    <h1 class="brand">AI Leaders Digest</h1>
  </div>
  <div class="tagline">chronicles of the demigods</div>
  <div class="stats-strip" id="stats-strip"></div>
</header>

<div class="rune-divider" aria-hidden="true">
  <span class="line"></span>
  <span class="glyph">◇ ◆ ◇</span>
  <span class="line"></span>
</div>

<nav class="tabs">
  <button class="tab active" data-tab="tweets" id="tab-tweets">Tweets</button>
  <button class="tab" data-tab="digests" id="tab-digests">Digests</button>
</nav>

<!-- ===================== TWEETS view ===================== -->
<section id="view-tweets">
  <div class="toolbar">
    <div class="search-wrap">
      <input type="search" id="search" placeholder="search the chronicles…">
    </div>
    <select id="author-filter">
      <option value="">All authors</option>
    </select>
    <button class="btn" id="starred-toggle">★ Starred only</button>
  </div>
  <div class="feed" id="tweet-feed"></div>
  <div class="load-more-wrap" id="load-more-wrap"></div>
</section>

<section id="view-digests" hidden>
  <div class="digests-list" id="digest-list"></div>
</section>

<!-- ===================== Modal ===================== -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal" role="dialog" aria-modal="true">
    <button class="modal-close" id="modal-close" aria-label="close">×</button>
    <header class="modal-header">
      <div>
        <span class="modal-eyebrow">Digest of the day</span>
        <h2 class="modal-title" id="modal-title">…</h2>
      </div>
      <span class="modal-meta" id="modal-meta"></span>

    <div class="modal-body" id="modal-body"></div>

</div>

  <div class="seal" aria-hidden="true">
    <svg viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="14"/>
      <circle class="ring-spark" cx="20" cy="20" r="14" stroke-dasharray="6 80"/>
      <circle cx="20" cy="20" r="9"/>
      <circle cx="20" cy="20" r="2.5" fill="var(--er-gold-muted)" stroke="none"/>
    </svg>
  </div>
  <div class="footer-text">grace beckons · refresh to gather</div>
</footer>

</main>

<script>
// ============================================================
// State
// ============================================================
const state = {
  tab: 'tweets',
  page: 1,
  pageSize: 50,
  author: '',
  query: '',
  starred: false,
  loading: false,
  hasNext: false,
  authorMap: {},
};

const $ = (sel) => document.querySelector(sel);

// ============================================================
// Aura — gold halo follows cursor (desktop only)
// ============================================================
(function setupAura() {
  const aura = $('#aura');
  if (!aura || !window.matchMedia('(hover: hover)').matches) return;
  let raf = null;
  document.addEventListener('mousemove', (ev) => {
    aura.classList.add('live');
    if (raf) return;
    raf = requestAnimationFrame(() => {
      aura.style.left = ev.clientX + 'px';
      aura.style.top = ev.clientY + 'px';
      raf = null;
    });
  }, { passive: true });
})();

// ============================================================
// SVG snippets
// ============================================================
const STAR_SVG = `<svg viewBox="0 0 24 24" aria-hidden="true">
  <path class="star-stroke" d="M12 2.5l2.7 6.4 6.9.6-5.2 4.6 1.6 6.8L12 17.3l-6 3.6 1.6-6.8-5.2-4.6 6.9-.6z"/>
</svg>`;

const RINGS_SVG = `
  <svg class="r-outer" viewBox="0 0 56 56"><circle cx="28" cy="28" r="25"/></svg>
  <svg class="r-mid" viewBox="0 0 56 56"><circle cx="28" cy="28" r="18"/></svg>
  <svg class="r-inner" viewBox="0 0 56 56"><circle cx="28" cy="28" r="10"/></svg>
`;

function loaderHTML(text) {
  return `<div class="loader"><div class="rings">${RINGS_SVG}</div><div class="loader-text">${text}</div></div>`;
}

function emptyHTML(title, body) {
  return `<div class="empty">
    <div class="empty-glyph">◇ ◆ ◇</div>
    <div class="empty-title">${title}</div>
    <div class="empty-text">${body}</div>
  </div>`;
}

// ============================================================
// Helpers
// ============================================================
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return iso.slice(0, 10);
  const now = new Date();
  const diffMs = now - d;
  const diffH = diffMs / 3600000;
  if (diffH < 1) return Math.max(1, Math.floor(diffMs / 60000)) + 'm';
  if (diffH < 24) return Math.floor(diffH) + 'h';
  if (diffH < 24 * 7) return Math.floor(diffH / 24) + 'd';
  return d.toISOString().slice(0, 10);
}
function fmtFullDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return iso.slice(0, 10);
  return d.toISOString().slice(0, 10);
}
function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}
function avatarInitial(name) {
  const ch = (name || '?').trim().charAt(0).toUpperCase();
  return ch || '?';
}
async function fetchJSON(url, opts) {
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ============================================================
// Stats
// ============================================================
async function loadStats() {
  try {
    const s = await fetchJSON('/api/stats');
    const latestStr = s.latest_tweet ? fmtFullDate(s.latest_tweet) : '—';
    $('#stats-strip').innerHTML = `
      <span class="stat">Tweets <span class="stat-num">${s.tweets_total}</span></span>
      <span class="stat">Starred <span class="stat-num">${s.tweets_starred}</span></span>
      <span class="stat">Sources <span class="stat-num">${s.authors_enabled}</span></span>
      <span class="stat">Digests <span class="stat-num">${s.summaries_total}</span></span>
      <span class="stat">Latest <span class="stat-num">${latestStr}</span></span>
    `;
  } catch (e) {
    $('#stats-strip').innerHTML = `<span class="stat">stats unavailable</span>`;
  }
}

// ============================================================
// Authors
// ============================================================
async function loadAuthors() {
  const { authors } = await fetchJSON('/api/authors');
  state.authorMap = Object.fromEntries(authors.map(a => [a.handle, a]));
  const sel = $('#author-filter');
  sel.innerHTML = '<option value="">All authors</option>' +
    authors.map(a =>
      `<option value="${escapeHtml(a.handle)}">${escapeHtml(a.name)} · ${a.tweet_count}</option>`
    ).join('');
}

// ============================================================
// Tweets
// ============================================================
function tweetCardHTML(t) {
  const name = t.author_name || t.author;
  const init = avatarInitial(name);
  const starredClass = t.starred ? ' starred' : '';
  const cat = t.category ? `<span class="cat">${escapeHtml(t.category)}</span>` : '';
  const rt = t.is_retweet ? `<span class="retweet-tag">↻ Retweet</span>` : '';
  const url = t.url ? `<a href="${escapeHtml(t.url)}" target="_blank" rel="noopener">View on X</a>` : '';
  return `
    <article class="tweet" data-tweet-id="${t.id}">
      <div class="avatar" title="${escapeHtml(name)}">${escapeHtml(init)}</div>
      <div class="tweet-body">
        <div class="tweet-meta">
          <span class="author-name" data-handle="${escapeHtml(t.author)}">${escapeHtml(name)}</span>
          <span class="handle">${escapeHtml(t.author)}</span>
          ${cat}
          ${rt}
          <span class="timestamp" title="${escapeHtml(t.date)}">${fmtDate(t.date)}</span>
        </div>
        <div class="tweet-text">${escapeHtml(t.text)}</div>
        <div class="tweet-actions">
          <button class="star-btn${starredClass}" data-action="star" aria-label="star tweet">${STAR_SVG}</button>
          ${url}
        </div>
      </div>
    </article>
  `;
}

async function loadTweets({ append = false } = {}) {
  if (state.loading) return;
  state.loading = true;
  const feed = $('#tweet-feed');
  if (!append) feed.innerHTML = loaderHTML('the grace is gathering…');

  const params = new URLSearchParams({
    page: state.page, page_size: state.pageSize,
  });
  if (state.author) params.set('author', state.author);
  if (state.query) params.set('q', state.query);
  if (state.starred) params.set('starred', 'true');

  let data;
  try {
    data = await fetchJSON('/api/tweets?' + params);
  } catch (e) {
    feed.innerHTML = emptyHTML('the lands are still', `(${e.message})`);
    state.loading = false;
    return;
  }

  state.hasNext = data.has_next;
  const html = data.tweets.map(tweetCardHTML).join('');

  if (!append) {
    if (data.tweets.length === 0) {
      feed.innerHTML = emptyHTML('The world has gone silent', 'No tweets match the current filter.');
    } else {
      feed.innerHTML = html;
    }
  } else {
    feed.insertAdjacentHTML('beforeend', html);
  }

  const lm = $('#load-more-wrap');
  lm.innerHTML = state.hasNext
    ? `<button class="btn" id="load-more-btn">Reveal more</button>`
    : '';
  if (state.hasNext) {
    $('#load-more-btn').addEventListener('click', () => {
      state.page += 1;
      loadTweets({ append: true });
    });
  }

  state.loading = false;
}

// ============================================================
// Star
// ============================================================
async function toggleStar(btn, tweetId) {
  const wasStarred = btn.classList.contains('starred');
  const url = `/api/tweets/${tweetId}/${wasStarred ? 'unstar' : 'star'}`;
  try { await fetchJSON(url, { method: 'POST' }); } catch (e) { return; }
  btn.classList.toggle('starred');
  if (!wasStarred) emitEmbers(btn);
  loadStats();
}
function emitEmbers(btn) {
  for (let i = 0; i < 4; i++) {
    const e = document.createElement('span');
    e.className = 'ember';
    const dx = (Math.random() - 0.5) * 18;
    e.style.setProperty('--dx', dx + 'px');
    e.style.animation = `ember-rise 700ms ease-out forwards`;
    e.style.animationDelay = (i * 60) + 'ms';
    btn.appendChild(e);
    setTimeout(() => e.remove(), 850);
  }
}

// ============================================================
// Digests
// ============================================================
async function loadDigests() {
  const list = $('#digest-list');
  list.innerHTML = loaderHTML('opening the archive…');
  let data;
  try {
    data = await fetchJSON('/api/summaries');
  } catch (e) {
    list.innerHTML = emptyHTML('archive sealed', `(${e.message})`);
    return;
  }
  if (!data.summaries.length) {
    list.innerHTML = emptyHTML('no chronicles yet', 'No digests have been written.');
    return;
  }
  list.innerHTML = data.summaries.map(s => `
    <div class="digest-row" data-id="${s.id}">
      <div class="digest-date">${escapeHtml(s.date)}</div>
      <div class="digest-meta">
        <span class="digest-meta-num">${s.tweet_count ?? 0}</span> tweets ·
        <span class="digest-meta-num">${s.sources_ok ?? 0}/${s.sources_total ?? 0}</span> sources ·
        <em>${escapeHtml(s.focus_profile || 'default')}</em>
      </div>
      <button class="btn" data-action="open">Open</button>
    </div>
  `).join('');
}

async function openDigest(id) {
  const backdrop = $('#modal-backdrop');
  $('#modal-title').textContent = 'Loading…';
  $('#modal-meta').textContent = '';
  $('#modal-body').innerHTML = loaderHTML('unfurling the parchment…');
  backdrop.classList.add('open');
  let s;
  try {
    s = await fetchJSON('/api/summaries/' + id);
  } catch (e) {
    $('#modal-body').innerHTML = emptyHTML('lost to time', `(${e.message})`);
    return;
  }
  $('#modal-title').textContent = s.date;
  $('#modal-meta').textContent =
    `${s.tweet_count ?? 0} tweets · ${s.sources_ok ?? 0}/${s.sources_total ?? 0} sources · ${s.focus_profile || 'default'}`;
  $('#modal-body').innerHTML = window.marked
    ? marked.parse(s.content || '')
    : `<pre style="white-space:pre-wrap">${escapeHtml(s.content || '')}</pre>`;
  $('#modal-body').scrollTop = 0;
}

// ============================================================
// Tabs
// ============================================================
function switchTab(tab) {
  state.tab = tab;
  document.querySelectorAll('.tab').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  $('#view-tweets').hidden = tab !== 'tweets';
  $('#view-digests').hidden = tab !== 'digests';
  if (tab === 'digests') loadDigests();
  if (tab === 'tweets' && !$('#tweet-feed').children.length) loadTweets();
}

// ============================================================
// Event delegation
// ============================================================
document.addEventListener('click', (ev) => {
  const tabBtn = ev.target.closest('.tab');
  if (tabBtn) { switchTab(tabBtn.dataset.tab); return; }

  const starBtn = ev.target.closest('.star-btn');
  if (starBtn) {
    const t = starBtn.closest('.tweet');
    if (t) toggleStar(starBtn, t.dataset.tweetId);
    return;
  }

  const authorLink = ev.target.closest('.author-name');
  if (authorLink) {
    state.author = authorLink.dataset.handle;
    state.page = 1;
    $('#author-filter').value = state.author;
    switchTab('tweets');
    loadTweets();
    return;
  }

  const digestRow = ev.target.closest('.digest-row');
  if (digestRow && ev.target.closest('[data-action="open"]')) {
    openDigest(digestRow.dataset.id);
    return;
  }

  if (ev.target === $('#modal-backdrop') || ev.target.closest('#modal-close')) {
    $('#modal-backdrop').classList.remove('open');
    return;
  }
});

document.addEventListener('keydown', (ev) => {
  if (ev.key === 'Escape') $('#modal-backdrop').classList.remove('open');
});

let searchDebounce;
$('#search').addEventListener('input', (ev) => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    state.query = ev.target.value.trim();
    state.page = 1;
    loadTweets();
  }, 250);
});

$('#author-filter').addEventListener('change', (ev) => {
  state.author = ev.target.value;
  state.page = 1;
  loadTweets();
});

$('#starred-toggle').addEventListener('click', () => {
  state.starred = !state.starred;
  $('#starred-toggle').classList.toggle('active', state.starred);
  state.page = 1;
  loadTweets();
});

// ============================================================
// Boot
// ============================================================
(async function init() {
  await Promise.all([loadStats(), loadAuthors()]);
  loadTweets();
})();
</script>
</body>
</html>
